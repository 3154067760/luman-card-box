# 复制到 /etc/nginx/sites-available/luman-card-box 后启用
# sudo ln -s /etc/nginx/sites-available/luman-card-box /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 39.105.176.96;

    root /var/www/luman_card_box/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 多设备同步 API → Node 服务 (pm2: luman-sync)
    location /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
